<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - UnimartX Seller</title>
    <script src="../../../config.js"></script>
    <script>
      if (localStorage.getItem("seller_sidebar_collapsed") === "true") {
        document.documentElement.classList.add("no-transition");
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared/seller-base.css">
    <link rel="stylesheet" href="shared/sidebar.css">
    <link rel="stylesheet" href="shared/topnav.css">
    <link rel="stylesheet" href="./assets/css/notifications.css">
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <div class="sidebar-logo-icon"><i data-lucide="store"></i></div>
            <span class="sidebar-logo-text">Unimart<span>X</span></span>
        </div>
        <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
            <i data-lucide="chevron-left"></i>
        </button>
        <nav class="sidebar-nav">
            <span class="nav-section-label">Main</span>
            <a href="dashboard/overview.html" class="nav-item" data-tooltip="Dashboard">
                <div class="nav-item-icon"><i data-lucide="layout-dashboard"></i></div>
                <span class="nav-item-label">Dashboard</span>
            </a>
            <a href="./orders/order-list.html" class="nav-item" data-tooltip="Orders">
                <div class="nav-item-icon"><i data-lucide="shopping-bag"></i></div>
                <span class="nav-item-label">Orders</span>
                <span class="nav-item-badge" id="sidebar-orders-count"></span>
            </a>
            <a href="./products/product-list.html" class="nav-item" data-tooltip="Products">
                <div class="nav-item-icon"><i data-lucide="package"></i></div>
                <span class="nav-item-label">Products</span>
            </a>
            <span class="nav-section-label">Store</span>
            <a href="./products/add-product.html" class="nav-item" data-tooltip="Add Product">
                <div class="nav-item-icon"><i data-lucide="plus-circle"></i></div>
                <span class="nav-item-label">Add Product</span>
            </a>
            <a href="./profile/customize-store.html" class="nav-item" data-tooltip="My Store">
                <div class="nav-item-icon"><i data-lucide="store"></i></div>
                <span class="nav-item-label">My Store</span>
            </a>
            <a href="./profile/customize-profile.html" class="nav-item" data-tooltip="Profile">
                <div class="nav-item-icon"><i data-lucide="user"></i></div>
                <span class="nav-item-label">Profile</span>
            </a>
            <a href="./profile/account-settings.html" class="nav-item" data-tooltip="Settings">
                <div class="nav-item-icon"><i data-lucide="settings"></i></div>
                <span class="nav-item-label">Settings</span>
            </a>
            <span class="nav-section-label">More</span>
            <a href="notifications.html" class="nav-item active" data-tooltip="Notifications">
                <div class="nav-item-icon"><i data-lucide="bell"></i></div>
                <span class="nav-item-label">Notifications</span>
                <span class="nav-item-badge" id="sidebar-notif-count"></span>
            </a>
            <a href="../../public/home.html" class="nav-item" data-tooltip="Home">
                <div class="nav-item-icon"><i data-lucide="home"></i></div>
                <span class="nav-item-label">Home</span>
            </a>
            <a href="../../public/info/faq.html" class="nav-item" data-tooltip="Help">
                <div class="nav-item-icon"><i data-lucide="help-circle"></i></div>
                <span class="nav-item-label">Help & FAQ</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-user">
                <div class="sidebar-avatar" id="sidebar-avatar"></div>
                <div class="sidebar-user-info">
                    <p class="sidebar-user-name" id="sidebar-name"></p>
                    <p class="sidebar-user-role" id="sidebar-store"></p>
                </div>
                <a href="../../auth/logout.html" class="sidebar-logout" aria-label="Log out">
                    <i data-lucide="log-out"></i>
                </a>
            </div>
        </div>
    </aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- TOPNAV -->
    <header class="topnav" id="topnav">
        <button class="topnav-hamburger" id="topnav-hamburger" aria-label="Open menu">
            <i data-lucide="menu"></i>
        </button>
        <div class="topnav-title">
            <h1>Notifications</h1>
            <p>Your latest updates and alerts</p>
        </div>
        <div class="topnav-search">
            <i data-lucide="search"></i>
            <input type="search" placeholder="Search notifications…" aria-label="Search">
        </div>
        <div class="topnav-actions">
            <button class="topnav-btn" id="mark-all-read" aria-label="Mark all as read">
                <i data-lucide="check-check"></i>
                <span>Mark all read</span>
            </button>
            <div style="position:relative;">
                <div class="topnav-user" id="topnav-user">
                    <div class="topnav-avatar" id="topnav-avatar"></div>
                    <span class="topnav-username" id="topnav-username"></span>
                    <i data-lucide="chevron-down" class="topnav-chevron"></i>
                </div>
                <div class="topnav-dropdown" id="topnav-dropdown">
                     <a href="./profile/customize-profile.html" class="dropdown-item"><i data-lucide="user"></i> My Profile</a>
                    <a href="./profile/customize-store.html" class="dropdown-item"><i data-lucide="store"></i> My Store</a>
                    <a href="./profile/account-settings.html" class="dropdown-item"><i data-lucide="settings"></i> Settings</a>
                    <div class="dropdown-divider"></div>
                    <a href="../../auth/logout.html" class="dropdown-item dropdown-item--danger"><i data-lucide="log-out"></i> Log Out</a>
                </div>
            </div>
        </div>
    </header>

    <!-- MAIN -->
    <div class="seller-main" id="seller-main">
        <div class="page-content">
            <div class="page-header">
                <h1>Notifications</h1>
                <p>Stay updated with your store activity</p>
            </div>

            <!-- Filter tabs -->
            <div class="notif-filters">
                <button class="notif-filter active" data-filter="all">All</button>
                <button class="notif-filter" data-filter="unread">Unread</button>
                <button class="notif-filter" data-filter="orders">Orders</button>
                <button class="notif-filter" data-filter="products">Products</button>
                <button class="notif-filter" data-filter="system">System</button>
            </div>

            <!-- Notifications list -->
            <div class="notifications-list" id="notifications-list">
                <!-- Populated by JS -->
            </div>

            <!-- Load more -->
            <button class="load-more-btn" id="load-more" style="margin-top: 2rem;">
                <i data-lucide="chevron-down"></i> Load More
            </button>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <script>lucide.createIcons();</script>
    <script src="./shared/polling.js"></script>
    <script src="./shared/sidebar.js"></script>
    <script src="./shared/topnav.js"></script>
    <script src="./assets/js/notifications.js"></script>
</body>
</html>
