<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goodbye - UnimartX</title>
    <meta name="description" content="You've been signed out of UnimartX — the campus marketplace built for buyers and sellers who mean business.">
    <meta property="og:title" content="Goodbye - UnimartX">
    <meta property="og:description" content="You've been signed out of UnimartX.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.unimartx.com/auth/logout.html">
    <meta property="og:image" content="https://www.unimartx.com/assets/images/og-logout.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:site_name" content="UnimartX">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" href="https://www.unimartx.com/auth/logout.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/logout.css">
</head>
<body>

    <nav>
        <a href="../public/home.html" class="logo">Unimart<span>X</span></a>
    </nav>

    <!-- Full-bleed slideshow -->
    <div class="slideshow-bg">
        <div class="slide active" style="background-image: url('assets/images/logout-wallpapers/logout-1.webp')"></div>
        <div class="slide" style="background-image: url('assets/images/logout-wallpapers/logout-2.webp')"></div>
        <div class="slide" style="background-image: url('assets/images/logout-wallpapers/logout-3.webp')"></div>
        <div class="slide" style="background-image: url('assets/images/logout-wallpapers/logout-4.webp')"></div>
        <div class="slide" style="background-image: url('assets/images/logout-wallpapers/logout-5.webp')"></div>
        <div class="slide" style="background-image: url('assets/images/logout-wallpapers/logout-6.webp')"></div>
        <div class="slide-dim"></div>
    </div>

    <!-- Centered farewell card -->
    <main class="logout-main">
        <div class="logout-card">
            <div class="logout-icon">
                <i data-lucide="log-out"></i>
            </div>
            <h1>Until next time.</h1>
            <p>You've been signed out of your UnimartX account.</p>

            <div class="card-actions">
                <a href="../public/home.html" class="btn btn-primary">
                    <i data-lucide="home" aria-hidden="true"></i>
                    Return Home
                </a>
                <a href="login.html" class="btn btn-ghost">
                    <i data-lucide="log-in" aria-hidden="true"></i>
                    Log back in
                </a>
            </div>

            <a href="../public/shop/shop.html" class="guest-link">
                <i data-lucide="shopping-bag" aria-hidden="true"></i>
                Browse as guest
            </a>
        </div>
    </main>

    <!-- Slideshow controls — ambient, bottom of screen -->
    <div class="slideshow-controls">
        <div class="slide-taglines">
            <span class="slide-tagline active">Until next time.</span>
            <span class="slide-tagline">Take care.</span>
            <span class="slide-tagline">See you soon.</span>
            <span class="slide-tagline">Come back anytime.</span>
            <span class="slide-tagline">Safe travels.</span>
            <span class="slide-tagline">You're always welcome.</span>
        </div>

        <div class="controls-row">
            <div class="slide-counter">
                <span class="counter-current">01</span>
                <span class="counter-sep">/</span>
                <span class="counter-total">06</span>
            </div>
            <div class="slide-dots">
                <button class="dot active" data-index="0" aria-label="Slide 1"></button>
                <button class="dot" data-index="1" aria-label="Slide 2"></button>
                <button class="dot" data-index="2" aria-label="Slide 3"></button>
                <button class="dot" data-index="3" aria-label="Slide 4"></button>
                <button class="dot" data-index="4" aria-label="Slide 5"></button>
                <button class="dot" data-index="5" aria-label="Slide 6"></button>
            </div>
            <div class="slide-arrows">
                <button class="arrow-btn prev-btn" aria-label="Previous slide">
                    <i data-lucide="arrow-left"></i>
                </button>
                <button class="arrow-btn next-btn" aria-label="Next slide">
                    <i data-lucide="arrow-right"></i>
                </button>
            </div>
        </div>

        <div class="progress-bar-wrap">
            <div class="progress-bar"></div>
        </div>
    </div>

    <script src="../../config.js"></script>
    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <script src="js/logout.js"></script>
    <script>
      (function () {
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', function () {
            if (window.lucide && lucide.createIcons) lucide.createIcons();
          });
        } else if (window.lucide && lucide.createIcons) {
          lucide.createIcons();
        }
      })();
    </script>
</body>
</html>
