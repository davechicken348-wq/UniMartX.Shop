<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Signed out - UnimartX</title>
    <meta name="description" content="You've been signed out of UnimartX — the campus marketplace built for buyers and sellers who mean business.">
    <meta name="theme-color" content="#f7f9f8">
    <meta name="color-scheme" content="light">
    <meta property="og:title" content="Signed out - UnimartX">
    <meta property="og:description" content="You've been signed out of UnimartX.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.unimartx.com/auth/logout.html">
    <meta property="og:image" content="https://www.unimartx.com/assets/images/og-logout.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:site_name" content="UnimartX">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" href="https://www.unimartx.com/auth/logout.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/logout.css">
</head>
<body>
    <div class="bg" aria-hidden="true">
        <div class="bg-glow bg-glow-1"></div>
        <div class="bg-glow bg-glow-2"></div>
        <div class="bg-grid"></div>
    </div>

    <main class="page">
        <a href="../public/home.html" class="logo" aria-label="UnimartX home">
            <span class="logo-mark" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path>
                    <path d="M3 6h18"></path>
                    <path d="M16 10a4 4 0 0 1-8 0"></path>
                </svg>
            </span>
            <span class="logo-text">Unimart<span class="logo-x">X</span></span>
        </a>

        <section class="card" aria-labelledby="card-title">
            <div class="success-badge" aria-hidden="true">
                <svg class="check-ring" viewBox="0 0 52 52">
                    <circle class="check-circle" cx="26" cy="26" r="24" fill="none"></circle>
                    <path class="check-mark" fill="none" d="M14 27l8 8 16-18"></path>
                </svg>
            </div>

            <header class="card-head">
                <h1 id="card-title">You're signed out</h1>
                <p class="support">Thanks for shopping with UnimartX. Your session has ended safely — we'll be here whenever you're ready to come back.</p>
            </header>

            <div class="card-actions">
                <a href="../public/home.html" class="btn btn-primary">
                    <i data-lucide="home" aria-hidden="true"></i>
                    Return Home
                </a>
                <a href="login.html" class="btn btn-ghost">
                    <i data-lucide="log-in" aria-hidden="true"></i>
                    Log back in
                </a>
            </div>

            <a href="../public/shop/shop.html" class="guest-link">
                <i data-lucide="shopping-bag" aria-hidden="true"></i>
                Continue browsing as a guest
            </a>
        </section>

        <footer class="copyright">Made with care for the University of Ghana community</footer>
    </main>

    <script src="../../config.js"></script>
    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <script src="js/logout.js"></script>
    <script>
      (function () {
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', function () {
            if (window.lucide && lucide.createIcons) lucide.createIcons();
          });
        } else if (window.lucide && lucide.createIcons) {
          lucide.createIcons();
        }
      })();
    </script>
</body>
</html>
