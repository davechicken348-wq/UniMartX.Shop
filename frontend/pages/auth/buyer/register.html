<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create a buyer account on UnimartX — the campus marketplace for students.">
    <meta name="theme-color" content="#0a0a0f">
    <title>Create Account - UnimartX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/buyer-register.css">
</head>
<body>

    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
        <div class="shape shape-5"></div>
    </div>

    <div class="page">
        <a href="../../public/home.html" class="logo">
            <span class="logo-icon">🛍️</span> Unimart<span>X</span>
        </a>

        <div class="card">
            <div class="card-header">
                <h1>create your account</h1>
                <p>join the marketplace and start shopping</p>
            </div>

            <div id="alert-success" class="alert alert-success" role="alert">
                <i data-lucide="check-circle" class="alert-icon"></i>
                <div class="success-content">
                    <span class="success-main">Account created!</span>
                    <span class="success-sub">Check your email to verify your account before logging in.</span>
                </div>
            </div>
            <div id="alert-error" class="alert alert-error" role="alert">
                <i data-lucide="alert-circle" class="alert-icon"></i>
                <span id="error-text"></span>
            </div>

            <form id="register-form" novalidate>
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <div class="input-wrapper">
                        <i data-lucide="user" class="input-icon"></i>
                        <input type="text" id="name" name="name" placeholder="e.g. Kwame Mensah" required minlength="2" autocomplete="name" aria-describedby="name-error">
                        <div class="input-glow"></div>
                    </div>
                    <div id="name-error" class="error-message" role="alert"></div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i data-lucide="mail" class="input-icon"></i>
                        <input type="email" id="email" name="email" placeholder="you@gmail.com" required autocomplete="email" aria-describedby="email-error">
                        <div class="input-glow"></div>
                    </div>
                    <div id="email-error" class="error-message" role="alert"></div>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <div class="input-wrapper">
                        <i data-lucide="phone" class="input-icon"></i>
                        <input type="tel" id="phone" name="phone" placeholder="e.g. 0551234567" required autocomplete="tel" aria-describedby="phone-error">
                        <div class="input-glow"></div>
                    </div>
                    <div id="phone-error" class="error-message" role="alert"></div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock" class="input-icon"></i>
                        <input type="password" id="password" name="password" placeholder="Min. 8 characters" required minlength="8" autocomplete="new-password" aria-describedby="password-error">
                        <button type="button" class="password-toggle" id="toggle-password" aria-label="Show password">
                            <i data-lucide="eye" class="eye-icon"></i>
                        </button>
                        <div class="input-glow"></div>
                    </div>
                    <div id="password-error" class="error-message" role="alert"></div>
                    <div class="password-strength">
                        <div id="strength-bar" class="password-strength-bar"></div>
                    </div>
                    <div class="strength-label" id="strength-label"></div>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock" class="input-icon"></i>
                        <input type="password" id="confirm-password" name="confirm-password" placeholder="Re-enter your password" required autocomplete="new-password" aria-describedby="confirm-password-error">
                        <button type="button" class="password-toggle" id="toggle-confirm" aria-label="Show password">
                            <i data-lucide="eye" class="eye-icon"></i>
                        </button>
                        <div class="input-glow"></div>
                    </div>
                    <div id="confirm-password-error" class="error-message" role="alert"></div>
                </div>

                <div class="form-check">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">
                        I agree to the <a href="../../public/info/terms.html" target="_blank" rel="noopener">Terms of Service</a> and <a href="../../public/info/privacy.html" target="_blank" rel="noopener">Privacy Policy</a>
                    </label>
                </div>
                <div id="terms-error" class="error-message" role="alert"></div>

                <button type="submit" class="auth-btn" id="submit-btn">
                    <span class="btn-text">Create Account</span>
                    <div class="spinner"></div>
                    <span class="btn-emoji">✨</span>
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="../login.html">Log in</a>
            </div>
        </div>

        <p class="copyright">© 2026 UnimartX. Made with 💚 for University of Ghana</p>
    </div>

    <script src="../../../config.js"></script>
    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <script src="../js/buyer-register.js"></script>

</body>
</html>
