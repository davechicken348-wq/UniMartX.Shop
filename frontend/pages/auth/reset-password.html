<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Set a new password for your UnimartX account.">
    <meta name="theme-color" content="#0a0a0f">
    <title>Reset Password - UnimartX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/reset-password.css">
</head>
<body>

<nav>
    <a href="../public/home.html" class="logo">Unimart<span>X</span></a>
    <div class="nav-links">
        <a href="../public/shop/shop.html">Shop</a>
    </div>
</nav>

<div class="auth-wrapper">

    <div class="form-panel">

        <div id="view-form">
            <div class="auth-header">
                <div class="auth-icon">
                    <i data-lucide="shield" aria-hidden="true"></i>
                </div>
                <h1>Reset Password</h1>
                <p>Enter your new password below.</p>
            </div>

            <div id="alert-error" class="alert alert-error" role="alert">
                <i data-lucide="alert-circle" aria-hidden="true"></i>
                <span id="error-text"></span>
            </div>

            <form id="reset-form" novalidate>
                <input type="hidden" id="reset-token" name="token">

                <div class="form-group">
                    <label for="new-password">New Password</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock" aria-hidden="true"></i>
                        <input type="password" id="new-password" name="newPassword" placeholder="At least 8 characters" required autocomplete="new-password" aria-describedby="password-error">
                        <button type="button" class="password-toggle" data-target="new-password" aria-label="Show password">
                            <i data-lucide="eye" aria-hidden="true"></i>
                        </button>
                    </div>
                    <div id="password-error" class="error-message" role="alert"></div>
                    <div class="password-strength">
                        <div class="password-strength-bar" id="strength-bar"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm New Password</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock" aria-hidden="true"></i>
                        <input type="password" id="confirm-password" name="confirmPassword" placeholder="Re-enter your password" required autocomplete="new-password" aria-describedby="confirm-error">
                        <button type="button" class="password-toggle" data-target="confirm-password" aria-label="Show password">
                            <i data-lucide="eye" aria-hidden="true"></i>
                        </button>
                    </div>
                    <div id="confirm-error" class="error-message" role="alert"></div>
                </div>

                <button type="submit" class="auth-btn" id="submit-btn">
                    <span class="btn-text">Reset Password</span>
                    <div class="spinner"></div>
                </button>
            </form>

            <div class="auth-footer">
                <a href="login.html"><i data-lucide="arrow-left"></i> Back to Login</a>
            </div>
        </div>

        <div id="view-success" class="hidden">
            <div class="success-view">
                <div class="success-icon">
                    <i data-lucide="check-circle" aria-hidden="true"></i>
                </div>
                <h1>Password Reset Complete</h1>
                <p>Your password has been successfully changed. You can now log in with your new password.</p>

                <a href="login.html" class="auth-btn success-btn">
                    <span class="btn-text">Go to Login</span>
                </a>

                <div class="auth-footer" style="margin-top: 1.25rem;">
                    <a href="login.html"><i data-lucide="arrow-left"></i> Back to Login</a>
                </div>
            </div>
        </div>

    </div>
</div>

<footer>
    &copy; 2026 UnimartX. <a href="../public/info/terms.html">Terms</a>
</footer>

<script src="../../config.js"></script>
    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
<script src="js/reset-password.js"></script>
</body>
</html>
