<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Setup — UnimartX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../auth/css/auth-shared.css">
    <link rel="stylesheet" href="../auth/css/admin-setup.css">
</head>
<body>
    <!-- Background shapes -->
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
        <div class="shape shape-5"></div>
    </div>

    <div class="page">
        <!-- Logo -->
        <a href="../public/home.html" class="logo">
            <span class="logo-icon">🛍️</span>
            Unimart<span>X</span>
        </a>

        <!-- Card -->
        <div class="card">
            <div class="card-header">
                <h1>Create Admin Account</h1>
                <p>Use the setup secret from your <code>.env</code> file to create the platform super admin.</p>
            </div>

            <!-- Alert: Error -->
            <div class="alert alert-error" id="alert-error">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                <span id="alert-error-text"></span>
            </div>

            <!-- Alert: Success -->
            <div class="alert alert-success" id="alert-success">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                <span id="alert-success-text"></span>
            </div>

            <form id="admin-setup-form" novalidate autocomplete="off">
                <!-- Setup Secret -->
                <div class="form-group">
                    <label for="admin-secret">Setup Secret</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
                        <input type="password" id="admin-secret" placeholder="ADMIN_REGISTER_SECRET" required autocomplete="off">
                        <button type="button" class="password-toggle" data-target="admin-secret" aria-label="Show secret">
                            <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                        <div class="input-glow"></div>
                    </div>
                    <div class="error-message" id="secret-error"></div>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="admin-email">Admin Email</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                        <input type="email" id="admin-email" placeholder="admin@unimartx.com" required autocomplete="email">
                        <div class="input-glow"></div>
                    </div>
                    <div class="error-message" id="email-error"></div>
                </div>

                <!-- Full Name -->
                <div class="form-group">
                    <label for="admin-name">Full Name</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        <input type="text" id="admin-name" placeholder="Admin Name" required autocomplete="name">
                        <div class="input-glow"></div>
                    </div>
                    <div class="error-message" id="name-error"></div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="admin-password">Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        <input type="password" id="admin-password" placeholder="Min. 8 characters" required minlength="8" autocomplete="new-password">
                        <button type="button" class="password-toggle" data-target="admin-password" aria-label="Show password">
                            <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                        <div class="input-glow"></div>
                    </div>
                    <div class="error-message" id="password-error"></div>
                </div>

                <!-- Submit -->
                <button type="submit" class="auth-btn" id="submit-btn">
                    <span class="btn-text">Create Admin Account</span>
                    <span class="spinner"></span>
                </button>
            </form>

            <p class="auth-footer">
                Already have an account? <a href="login.html">Log in</a>
            </p>
        </div>
    </div>

    <script src="../../config.js"></script>
    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <script>
        lucide.createIcons();

        const API_BASE = window.location.origin;

        const form = document.getElementById('admin-setup-form');
        const alertError = document.getElementById('alert-error');
        const alertSuccess = document.getElementById('alert-success');
        const alertErrorText = document.getElementById('alert-error-text');
        const alertSuccessText = document.getElementById('alert-success-text');
        const submitBtn = document.getElementById('submit-btn');

        function showAlert(el, textEl, msg) {
            textEl.textContent = msg;
            el.classList.add('visible');
            setTimeout(() => el.classList.remove('visible'), 6000);
        }

        function validateField(id, errorId, test) {
            const input = document.getElementById(id);
            const error = document.getElementById(errorId);
            const val = input.value.trim();
            if (!test(val)) {
                input.classList.add('error');
                input.classList.remove('success');
                error.textContent = id === 'admin-email' ? 'Enter a valid email' : 'This field is required';
                error.classList.add('visible');
                return false;
            }
            input.classList.remove('error');
            input.classList.add('success');
            error.textContent = '';
            error.classList.remove('visible');
            return true;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            alertError.classList.remove('visible');
            alertSuccess.classList.remove('visible');

            const secretOk = validateField('admin-secret', 'secret-error', v => v.length > 0);
            const emailOk = validateField('admin-email', 'email-error', v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v));
            const nameOk = validateField('admin-name', 'name-error', v => v.length >= 2);
            const passOk = validateField('admin-password', 'password-error', v => v.length >= 8);

            if (![secretOk, emailOk, nameOk, passOk].every(Boolean)) return;

            submitBtn.disabled = true;
            submitBtn.querySelector('.btn-text').textContent = 'Creating account…';
            submitBtn.classList.add('loading');

            try {
                const response = await fetch(`${API_BASE}/api/admin/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        adminSecret: document.getElementById('admin-secret').value,
                        email: document.getElementById('admin-email').value,
                        firstName: document.getElementById('admin-name').value.trim(),
                        password: document.getElementById('admin-password').value,
                    }),
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    showAlert(alertSuccess, alertSuccessText, 'Admin account created! Redirecting to login…');
                    form.reset();
                    document.querySelectorAll('.input-wrapper input').forEach(i => i.classList.remove('success'));
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    showAlert(alertError, alertErrorText, result.error || 'Failed to create admin account');
                }
            } catch (err) {
                showAlert(alertError, alertErrorText, 'Network error. Please try again.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.querySelector('.btn-text').textContent = 'Create Admin Account';
                submitBtn.classList.remove('loading');
            }
        });

        // Password toggles
        document.querySelectorAll('.password-toggle').forEach(btn => {
            btn.addEventListener('click', () => {
                const input = document.getElementById(btn.dataset.target);
                if (!input) return;
                const isPassword = input.type === 'password';
                input.type = isPassword ? 'text' : 'password';
                btn.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
            });
        });

        // Clear errors on input
        ['admin-secret', 'admin-email', 'admin-name', 'admin-password'].forEach(id => {
            const input = document.getElementById(id);
            const error = document.getElementById(id.replace('admin-', '') + '-error');
            input?.addEventListener('input', () => {
                input.classList.remove('error');
                if (error) {
                    error.textContent = '';
                    error.classList.remove('visible');
                }
            });
        });
    </script>
</body>
</html>
