<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Log in to your UniMartX account. Buy and sell with verified student sellers on campus.">
    <meta name="theme-color" content="#f7f9f8">
    <meta name="color-scheme" content="light">
    <title>Log In - UniMartX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/auth-system.css">
</head>
<body>
    <div class="bg" aria-hidden="true">
        <div class="bg-glow bg-glow-1"></div>
        <div class="bg-glow bg-glow-2"></div>
    </div>

    <main class="page">
        <a href="../public/home.html" class="logo" aria-label="UniMartX home">
            <span class="logo-mark" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path>
                    <path d="M3 6h18"></path>
                    <path d="M16 10a4 4 0 0 1-8 0"></path>
                </svg>
            </span>
            <span class="logo-text">Unimart<span class="logo-x">X</span></span>
        </a>

        <section class="card" aria-labelledby="card-title">
            <header class="card-head">
                <h1 id="card-title">Welcome Back</h1>
                <p id="support-text" class="support">Log in to your Buyer account to continue.</p>
            </header>

            <div class="segmented" role="radiogroup" aria-label="Select your role">
                <span class="segmented-indicator" aria-hidden="true"></span>
                <button type="button" class="seg-btn is-active" role="radio" aria-checked="true" data-role="buyer" tabindex="0">Buyer</button>
                <button type="button" class="seg-btn" role="radio" aria-checked="false" data-role="seller" tabindex="-1">Seller</button>
                <button type="button" class="seg-btn" role="radio" aria-checked="false" data-role="admin" tabindex="-1">Admin</button>
            </div>

            <div id="alert-error" class="alert alert-error" role="alert" hidden>
                <svg class="alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                <span id="error-text"></span>
            </div>

            <form id="login-form" novalidate>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                            <path d="m22 7-10 6L2 7"></path>
                        </svg>
                        <input type="email" id="email" name="email" placeholder="you@st.university.edu.gh" required autocomplete="email" aria-describedby="email-error" inputmode="email">
                    </div>
                    <div id="email-error" class="error-message" role="alert"></div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="3" y="11" width="18" height="11" rx="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password" aria-describedby="password-error">
                        <button type="button" class="password-toggle" id="toggle-password" aria-label="Show password" aria-pressed="false">
                            <svg class="eye-icon eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <svg class="eye-icon eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M9.88 9.88a3 3 0 0 0 4.24 4.24"></path>
                                <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c6.5 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"></path>
                                <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3.5 7 10 7a9.74 9.74 0 0 0 5.39-1.61"></path>
                                <line x1="2" y1="2" x2="22" y2="22"></line>
                            </svg>
                        </button>
                    </div>
                    <div id="password-error" class="error-message" role="alert"></div>
                </div>

                <div class="form-row-check">
                    <label class="checkbox">
                        <input type="checkbox" id="remember" name="remember">
                        <span class="checkbox-box" aria-hidden="true"></span>
                        <span class="checkbox-label">Remember me</span>
                    </label>
                    <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="auth-btn" id="submit-btn">
                    <span class="btn-text">Log In</span>
                    <span class="spinner" aria-hidden="true"></span>
                </button>
            </form>

            <div class="auth-footer">
                New to UniMartX? <a href="buyer/register.html">Create an account</a>
            </div>

            <div class="seller-cta">
                <span>Want to sell on campus?</span>
                <a href="seller/register.html">Become a seller</a>
            </div>
        </section>

        <footer class="copyright">Made with care for the University of Ghana community</footer>
    </main>

    <script src="../../config.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
