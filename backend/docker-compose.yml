version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: unimart_postgres
    environment:
      POSTGRES_USER: unimart_user
      POSTGRES_PASSWORD: unimart_password
      POSTGRES_DB: unimart_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unimart_user -d unimart_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
